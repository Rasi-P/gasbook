services:
  - type: web
    name: gasbook-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn gasbook.wsgi:application
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: gasbook-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://gasbook.vercel.app
